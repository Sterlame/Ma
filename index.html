<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sidebar: notebooks / documents -->
  <aside class="sidebar" id="sidebar" aria-label="Notebooks">
    <div class="sidebar-head">
      <span class="mark">間</span>
      <button class="icon-btn" id="newNotebookBtn" title="New notebook" aria-label="New notebook">+</button>
    </div>
    <nav class="notebook-list" id="notebookList"></nav>
    <div class="sidebar-foot">
      <button class="icon-btn" id="signInBtn">connect drive</button>
      <span class="sync-status" id="syncStatus">offline</span>
    </div>
  </aside>

  <!-- Document list within active notebook -->
  <aside class="doclist" id="doclist" aria-label="Documents">
    <div class="doclist-head">
      <span id="activeNotebookName">—</span>
      <button class="icon-btn" id="newDocBtn" title="New document" aria-label="New document">+</button>
    </div>
    <div class="doc-search">
      <input type="text" id="docSearch" placeholder="search / tag" autocomplete="off">
    </div>
    <div class="doc-items" id="docItems"></div>
  </aside>

  <!-- Main editor -->
  <main class="editor-wrap">
    <div class="editor-top">
      <button class="icon-btn only-mobile" id="menuBtn" aria-label="Menu">≡</button>
      <input type="text" id="docTitle" class="doc-title" placeholder="Untitled" autocomplete="off">
      <div class="editor-top-actions">
        <button class="icon-btn" id="focusBtn" title="Focus mode">focus</button>
        <button class="icon-btn" id="themeBtn" title="Theme">theme</button>
        <button class="icon-btn" id="syncNowBtn" title="Sync now">sync</button>
      </div>
    </div>

    <div class="editor-scroll">
      <div class="editor-column">
        <div id="editor" class="editor" contenteditable="true" spellcheck="true" data-placeholder="Begin."></div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="wordCount">0 words</span>
      <span class="dot">·</span>
      <span id="goalStatus">no goal</span>
      <span class="dot">·</span>
      <span id="tagLine">no tags</span>
      <span class="spacer"></span>
      <span id="savedState">saved</span>
    </div>
  </main>

  <!-- Theme picker popover -->
  <div class="popover" id="themePopover" hidden>
    <button data-theme-choice="light">light</button>
    <button data-theme-choice="sepia">sepia</button>
    <button data-theme-choice="dark">dark</button>
  </div>

  <script src="js/db.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
